name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-native:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          cmake -B build/native -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native --parallel
          cmake --build build/native --target package

      - name: Upload CPack artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: |
            build/native/mynumber-*.tar.gz
            build/native/mynumber-*.zip

  build-node:
    name: Node addon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build and stage native addon
        run: |
          cmake -B build/native -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native --target mynumber_static --parallel
          mkdir -p native-lib
          cp build/native/libmynumber.a native-lib/libmynumber.a
          make dist-node
          npm run stage:npm:native
          npm run package:prebuild

      - name: Upload prebuild tarball
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.os }}
          path: dist/npm/mynumber/build/stage/**/*.tar.gz

      - name: Remove staged npm build debris
        if: always()
        run: rm -rf dist/npm/mynumber/build dist/npm/mynumber/lib/binding

      - name: Package node release archive
        run: |
          mkdir -p dist/release
          ARCHIVE="mynumber-node-${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}.zip"
          cd dist/node
          zip -j "../release/${ARCHIVE}" mynumber.node index.d.ts

      - name: Upload node release archive
        uses: actions/upload-artifact@v4
        with:
          name: node-release-${{ matrix.os }}
          path: dist/release/mynumber-node-${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}.zip

      - name: Upload addon binary
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.os }}
          path: dist/node/mynumber.node

  build-wasm:
    name: WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          /tmp/emsdk/emsdk install latest
          /tmp/emsdk/emsdk activate latest

      - name: Build wasm distribution
        run: |
          source /tmp/emsdk/emsdk_env.sh
          make dist-wasm

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: |
            dist/wasm/mynumber.js
            dist/wasm/mynumber.wasm

      - name: Upload wasm release archive
        run: |
          mkdir -p dist/release
          cd dist/wasm
          zip -j ../release/mynumber-wasm.zip mynumber.js mynumber.wasm index.d.ts

      - name: Upload wasm release artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: dist/release/mynumber-wasm.zip

  build-demo:
    name: Demo site
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Download wasm
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: dist/wasm

      - name: Build demo
        run: |
          mkdir -p dist/demo
          cp demo/index.html demo/style.css demo/app.js dist/demo/
          cp dist/wasm/mynumber.js dist/wasm/mynumber.wasm dist/demo/

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo
          path: dist/demo/

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: [build-native, build-node, build-wasm]
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/native-macos-latest/*
            artifacts/native-ubuntu-latest/*
            artifacts/prebuild-macos-latest/*
            artifacts/prebuild-ubuntu-latest/*
            artifacts/node-release-macos-latest/mynumber-node-macos.zip
            artifacts/node-release-ubuntu-latest/mynumber-node-linux.zip
            artifacts/wasm-release/mynumber-wasm.zip

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [build-node, build-wasm, release]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          scope: '@lordofdestiny'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: dist/wasm

      - name: Download addon (linux) for staging
        uses: actions/download-artifact@v4
        with:
          name: addon-ubuntu-latest
          path: dist/node

      - name: Stage npm packages
        run: npm run stage:npm

      - name: Lint publish manifests
        run: npm run lint:packages

      - name: Publish @lordofdestiny/mynumber
        run: npm publish dist/npm/mynumber --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lordofdestiny/mynumber-wasm
        run: npm publish dist/npm/mynumber-wasm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-demo
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download demo
        uses: actions/download-artifact@v4
        with:
          name: demo
          path: dist/demo

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
