name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  package-source:
    name: Native source package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create native CMake source package
        run: node scripts/package-source.mjs

      - name: Stage cmake source for upload
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p upload/cmake-source
          cp "dist/release/mynumber-cmake-${VERSION}.zip" upload/cmake-source/
          cp "dist/release/mynumber-cmake-${VERSION}.tar.gz" upload/cmake-source/

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: source-release
          path: upload/cmake-source/
          if-no-files-found: error

  build-native:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: package-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - name: Download source package
        uses: actions/download-artifact@v4
        with:
          name: source-release
          path: dist/release

      - name: Build CPack archives (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/release
          unzip -q "mynumber-cmake-${VERSION}.zip"
          cd "mynumber-cmake-${VERSION}"
          cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target verify_native_artifacts --parallel
          cmake --build build --target package

      - name: Build CPack archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME.Substring(1)
          Set-Location dist/release
          Expand-Archive -Path "mynumber-cmake-$VERSION.zip" -DestinationPath . -Force
          Set-Location "mynumber-cmake-$VERSION"
          cmake -B build
          cmake --build build --config Release --target verify_native_artifacts --parallel
          cmake --build build --config Release --target package

      - name: Collect native release archives
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p upload/native-release
          cp dist/release/mynumber-cmake-"${VERSION}"/build/mynumber-"${VERSION}-"*.tar.gz upload/native-release/
          cp dist/release/mynumber-cmake-"${VERSION}"/build/mynumber-"${VERSION}-"*.zip upload/native-release/
          ls -la upload/native-release/

      - name: Upload CPack artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: upload/native-release/
          if-no-files-found: error

  build-node:
    name: Node addon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            release_platform: macos
          - os: ubuntu-latest
            release_platform: linux
          - os: windows-latest
            release_platform: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build and stage native addon (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build/native -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DMYNUMBER_BUILD_CLI=OFF
          cmake --build build/native --target mynumber_static --parallel
          node scripts/copy-native-static-lib.js build/native
          make dist-node
          npm run stage:npm:native

      - name: Build and stage native addon (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build/native -DMYNUMBER_BUILD_CLI=OFF
          cmake --build build/native --config Release --target mynumber_static --parallel
          node scripts/copy-native-static-lib.js build/native
          node scripts/build-dist-node.js
          npm run stage:npm:native

      - name: Package node release archives (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORM="${{ matrix.release_platform }}"
          mkdir -p upload/node-release
          BASENAME="mynumber-node-${VERSION}-${PLATFORM}"
          cd dist/node
          zip -j "../../upload/node-release/${BASENAME}.zip" mynumber.node index.d.ts
          tar -czf "../../upload/node-release/${BASENAME}.tar.gz" mynumber.node index.d.ts
          ls -la "../../upload/node-release/"

      - name: Package node release archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME.Substring(1)
          $PLATFORM = "${{ matrix.release_platform }}"
          New-Item -ItemType Directory -Force -Path upload/node-release | Out-Null
          $basename = "mynumber-node-$VERSION-$PLATFORM"
          Set-Location dist/node
          Compress-Archive -Path mynumber.node,index.d.ts -DestinationPath "../../upload/node-release/$basename.zip" -Force
          tar -czf "../../upload/node-release/$basename.tar.gz" mynumber.node index.d.ts
          Get-ChildItem "../../upload/node-release"

      - name: Upload node release archives
        uses: actions/upload-artifact@v4
        with:
          name: node-release-${{ matrix.os }}
          path: upload/node-release/
          if-no-files-found: error

      - name: Remove staged npm build debris
        if: always()
        shell: bash
        run: rm -rf dist/npm/mynumber/build dist/npm/mynumber/lib/binding

  build-wasm:
    name: WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          /tmp/emsdk/emsdk install latest
          /tmp/emsdk/emsdk activate latest

      - name: Build wasm distribution
        run: |
          source /tmp/emsdk/emsdk_env.sh
          make dist-wasm

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: |
            dist/wasm/mynumber.js
            dist/wasm/mynumber.wasm

      - name: Package wasm release archives
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p upload/wasm-release
          cd dist/wasm
          zip -j "../../upload/wasm-release/mynumber-wasm-${VERSION}.zip" mynumber.js mynumber.wasm index.d.ts
          tar -czf "../../upload/wasm-release/mynumber-wasm-${VERSION}.tar.gz" mynumber.js mynumber.wasm index.d.ts
          ls -la "../../upload/wasm-release/"

      - name: Upload wasm release archives
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: upload/wasm-release/
          if-no-files-found: error

  build-demo:
    name: Demo site
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Download wasm
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: dist/wasm

      - name: Build demo
        run: |
          mkdir -p dist/demo
          cp demo/index.html demo/style.css demo/app.js dist/demo/
          cp dist/wasm/mynumber.js dist/wasm/mynumber.wasm dist/demo/

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo
          path: dist/demo/

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: [package-source, build-native, build-node, build-wasm]
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/source-release artifacts/native-* artifacts/node-release-* artifacts/wasm-release \
            -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/
          test "$(find release-assets -type f | wc -l)" -eq 16 || {
            echo "Expected 16 release files (6 native, 2 cmake, 6 node, 2 wasm)" >&2
            exit 1
          }

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [build-node, build-wasm, release]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
          scope: '@lordofdestiny'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: dist/wasm

      - name: Stage npm packages
        run: npm run stage:npm

      - name: Lint publish manifests
        run: npm run lint:packages

      - name: Publish @lordofdestiny/mynumber
        run: npm publish dist/npm/mynumber --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lordofdestiny/mynumber-wasm
        run: npm publish dist/npm/mynumber-wasm --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-demo
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download demo
        uses: actions/download-artifact@v4
        with:
          name: demo
          path: dist/demo

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
